name: create-post-from-issue

on:
  issues:
    types: [labeled]

jobs:
  create-post:
    if: github.event.label.name == 'new-post' || contains(github.event.issue.labels.*.name, 'new-post')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Create blog post from issue
        id: create-post
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Extract info from issue
          TITLE="$ISSUE_TITLE"
          BODY="$ISSUE_BODY"

          # Validate body is not empty
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            echo "error=empty" >> $GITHUB_OUTPUT
            echo "Issue body is empty — skipping post creation."
            exit 0
          fi

          # Extract tags if specified in body with "Tags: tag1, tag2"
          TAGS=""
          if echo "$BODY" | grep -q "Tags:"; then
            TAGS=$(echo "$BODY" | grep "Tags:" | sed 's/Tags://' | tr -d '\r' | xargs)
            BODY=$(echo "$BODY" | grep -v "Tags:")
          fi

          # Create filename-friendly slug
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -dc 'a-z0-9-')
          DATE=$(date +%Y-%m-%d)
          YEAR=$(date +%Y)

          # Create post file with front matter in yearly directory
          mkdir -p "_posts/$YEAR"

          # Write front matter and content
          {
            printf '%s\n' '---'
            printf '%s\n' 'layout: post'
            printf 'title: "%s"\n' "$TITLE"
            printf 'date: %s\n' "$(date +"%Y-%m-%d %H:%M:%S")"
            if [ -n "$TAGS" ]; then
              printf 'tags: %s\n' "$TAGS"
            fi
            printf '%s\n\n' '---'
            printf '%s\n' "$BODY"
          } > "_posts/$YEAR/$DATE-$SLUG.markdown"

          # Set outputs for subsequent steps
          echo "slug=${SLUG}" >> $GITHUB_OUTPUT

          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add "_posts/$YEAR/$DATE-$SLUG.markdown"
          git commit -m "Add new post: $ISSUE_TITLE"
          git push

      - name: Comment on issue (empty body)
        if: steps.create-post.outputs.error == 'empty'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              ...context.issue,
              body: `⚠️ Issue body is empty — no post was created. Add content and re-apply the \`new-post\` label.`
            });

      - name: Comment on issue (success)
        if: steps.create-post.outputs.error != 'empty'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const slug = "${{ steps.create-post.outputs.slug }}";
            const url = `https://alexanderle.com/${slug}`;
            await github.rest.issues.createComment({
              ...context.issue,
              body: `✅ Post published! View it at: ${url}`
            });
            await github.rest.issues.update({
              ...context.issue,
              state: 'closed'
            });