---
layout: default
---

<div class="post">
  <div class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}
      <div class="post-info">
        <time datetime="{{ page.date }}">{{ page.date | date: "%B %d, %Y" }}</time>
      </div>
    {% endif %}
  </div>

  {{ content }}

</div>

<div class="post-nav">
  {% if page.next.url %}<a href="{{ page.next.url | prepend: site.baseurl }}">&#8592; Prev</a>{% endif %}
  <a href="/" class="home">Home</a>
  {% if page.previous.url %}<a href="{{ page.previous.url | prepend: site.baseurl }}">Next &#8594;</a>{% endif %}
</div>
